# Do not edit this file. It is generated from toolchain.yml.j2.

name: toolchain

on:
  push:
    branches:
      - main
    paths:
    - 'docker/**'
    - '.github/workflows/toolchain.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
    - 'docker/**'
    - '.github/workflows/toolchain.yml'

permissions:
  packages: write

jobs:
  toolchain:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [ppc64le, s390x, x64]
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: ARCH=${{ matrix.arch }} docker/build -t ghcr.io/ibm/dotnet-${{ matrix.arch }}-toolchain:latest
    - name: Login
      if: ${{ github.event_name == 'push' }}
      run: echo ${{ secrets.GITHUB_TOKEN }} |
           docker login ghcr.io --username=${{ github.actor }} --password-stdin
    - name: Push
      if: ${{ github.event_name == 'push' }}
      run: docker push ghcr.io/ibm/dotnet-${{ matrix.arch }}-toolchain:latest
    - name: Save image for PR build
      if: ${{ github.event_name == 'pull_request' }}
      run: docker save ghcr.io/ibm/dotnet-${{ matrix.arch }}-toolchain:latest -o toolchain-image.tar
    - name: Upload image artifact
      if: ${{ github.event_name == 'pull_request' }}
      uses: actions/upload-artifact@v4
      with:
        name: toolchain-image-${{ matrix.arch }}
        path: toolchain-image.tar
        retention-days: 1
