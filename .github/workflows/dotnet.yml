# Do not edit this file. It is generated from dotnet.yml.j2.

on:
  push:
    branches:
    - main
    tags:
    - 'v*'
  workflow_run:
    workflows: ["toolchain"]
    types: [completed]

permissions:
  packages: read
  actions: read
  checks: write
  contents: write

jobs:
  sdk:
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_run' && github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [ppc64le, s390x]
        isV6:
        - ${{ startsWith(github.ref, 'refs/tags/v6.') }}
        exclude:
        - arch: ppc64le
          isV6: true
    steps:
    - name: Create check run
      if: ${{ github.event_name == 'workflow_run' }}
      id: check
      uses: actions/github-script@v7
      with:
        script: |
          const { data } = await github.rest.checks.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            name: 'sdk (${{ matrix.arch }}, ${{ matrix.isV6 }})',
            head_sha: '${{ github.event.workflow_run.head_sha }}',
            status: 'in_progress',
            details_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
          });
          return data.id;
    - name: Show free disk space
      run: df -h
    - name: Free some disk space
      run: rm -r /opt/hostedtoolcache
    - name: Show free disk space
      run: df -h
    - name: Configure git
      run: git config --global user.email iii@linux.ibm.com &&
           git config --global user.name "dotnet-s390x bot"
    - name: Checkout dotnet-s390x
      uses: actions/checkout@v4
      with:
        repository: ${{ github.event.workflow_run.head_repository.full_name || github.repository }}
        ref: ${{ github.event.workflow_run.head_sha || github.sha }}
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Install quilt
      run: |
        sudo apt-get update
        sudo apt-get install -y quilt
    - name: Prepare
      run: ./dotnet-prepare
    - name: Download toolchain image artifact
      if: ${{ github.event_name == 'workflow_run' }}
      uses: actions/download-artifact@v4
      with:
        name: toolchain-image-${{ matrix.arch }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
        run-id: ${{ github.event.workflow_run.id }}
    - name: Load toolchain image
      if: ${{ github.event_name == 'workflow_run' }}
      run: docker load -i toolchain-image.tar
    - name: Build
      run: ARCH=${{ matrix.arch }} ./docker/run-image ghcr.io/ibm/dotnet-${{ matrix.arch }}-toolchain:latest ./dotnet-build
    - name: Upload the intermediate results
      uses: actions/upload-artifact@v4
      with:
        name: sdk-${{ matrix.arch }}
        path: |
          local-downloads/
          local-packages/
          output/
    - name: Update check run
      if: ${{ always() && github.event_name == 'workflow_run' }}
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.checks.update({
            owner: context.repo.owner,
            repo: context.repo.repo,
            check_run_id: ${{ steps.check.outputs.result }},
            status: 'completed',
            conclusion: '${{ job.status }}',
          });
  release:
    needs: sdk
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x64]
    if: ${{ github.event_name == 'push' && github.ref_type == 'tag' }}
    steps:
    - name: Show free disk space
      run: df -h
    - name: Free some disk space
      run: rm -r /opt/hostedtoolcache
    - name: Show free disk space
      run: df -h
    - name: Configure git
      run: git config --global user.email iii@linux.ibm.com &&
           git config --global user.name "dotnet-s390x bot"
    - name: Checkout dotnet-s390x
      uses: actions/checkout@v4
      with:
        repository: ${{ github.event.workflow_run.head_repository.full_name || github.repository }}
        ref: ${{ github.event.workflow_run.head_sha || github.sha }}
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Download the ppc64le sdk artifacts
      uses: actions/download-artifact@v4
      with:
        name: sdk-ppc64le
      if: ${{ !startsWith(github.ref, 'refs/tags/v6.') }}
    - name: Download the s390x sdk artifacts
      uses: actions/download-artifact@v4
      with:
        name: sdk-s390x
    - name: Create a release
      run: gh release create --notes "" "${{ github.ref_name }}" output/*
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
